<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Übung 4</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <main class="container">
        <!--
            m-5 = Margin (Abstand) auf allen Seiten
            5 = relativ großer Abstand
        -->
        <h1 class="m-5">
            Teilnehmerin Registrierung
        </h1>

        <div class="row">
            <!-- FIRST NAME -->
            <!--
                col-12 auf kleinen Bildschirmen ganze Breite

                col-md-6 auf Tablets 6 von 12 Spalten

                col-xl-3auf großen Bildschirmen 3 von 12 Spalten
            -->
            <div class="col-12 col-md-6 col-xl-3">
                  <!--
                    form-floating Floating Label Effekt

                    mb-3 margin-bottom (Abstand nach unten)
                -->
                <div class="form-floating mb-3">
                    <!-- Eingabefeld -->
                    <input
                        type="text"
                        class="form-control"
                        id="firstName"
                        placeholder="First name">
                    <!-- Beschriftung -->
                    <label for="firstName">
                        First name
                    </label>

                </div>
            </div>
            <!-- LAST NAME -->
            <div class="col-12 col-md-6 col-xl-3">
                 <div class="form-floating mb-3">
                    <input
                        type="text"
                        class="form-control"
                        id="lastName"
                        placeholder="Last name">
                    <label for="lastName">
                        Last name
                    </label>
                </div>
            </div>
            <!-- EMAIL -->
            <div class="col-12 col-md-6 col-xl-3">
                <div class="form-floating mb-3">
                    <!--
                        type="email"
                        Bootstrap/Browser erkennt Email-Adressen
                    -->
                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        placeholder="E-Mail">
                    <label for="email">
                        E-Mail
                    </label>
                </div>
            </div>
            <!-- IP ADDRESS -->
            <div class="col-12 col-md-6 col-xl-3">
                <div class="form-floating mb-3">
                    <input
                        type="text"
                        class="form-control"
                        id="ipAddress"
                        placeholder="IP-Address">
                    <label for="ipAddress">
                        IP-Address
                    </label>
                </div>
            </div>
            <!-- BUTTON ABBRECHEN -->
            <!--  col-6 Hälfte der Zeile -->
            <div class="col-6">
                <!-- btn Bootstrap Button
                    btn-secondary grauer Button
                    btn-lg großer Button
                    w-100 Breite 100%
                -->
                <button
                    type="button"
                    class="btn btn-secondary btn-lg w-100">
                    Abbrechen
                </button>

            </div>
            <!-- BUTTON REGISTRIEREN -->
            <div class="col-6">
                <!--
                    btn-success grüner Button
                -->
                <button
                    type="submit"
                    class="btn btn-success btn-lg w-100">

                    Registrieren

                </button>

            </div>

        </div>

    </main>

</body>

</html>
